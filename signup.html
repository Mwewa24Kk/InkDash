<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up - InkDash Print</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <div class="brand">
        <div class="brand-badge">ID</div>
        <div>
          <div>InkDash Print</div>
          <div class="helper">Express printing</div>
        </div>
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="makeorder.html">Make Order</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign up</a>
      </div>
      <div class="nav-actions">
        <a class="button ghost" href="makeorder.html">Start Order</a>
        <a class="button primary" href="login.html">Have an account?</a>
      </div>
    </div>
  </nav>

  <section class="auth-wrap">
    <div class="hero-card auth-card">
      <h1 class="section-title">Create your InkDash account</h1>
      <p class="helper">Save your institution details and get faster reorders.</p>
      <form class="form">
        <div class="form-row">
          <div class="input-group">
            <label for="first">First name</label>
            <input id="first" type="text" />
          </div>
          <div class="input-group">
            <label for="last">Last name</label>
            <input id="last" type="text" />
          </div>
        </div>

        <div class="input-group">
          <label for="email">Email address</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>

        <div class="input-group">
          <label for="institution">Institution</label>
          <input id="institution" type="text" placeholder="University, college, or company" />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Create a password" />
        </div>

        <button class="button primary" type="submit">Create account</button>
        <div class="helper">Already have an account? <a href="login.html">Log in</a></div>
      </form>
    </div>
  </section>
</body>
</html>
